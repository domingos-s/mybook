<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1877f2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="icon-192.svg" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>mybook</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">mybook</div>
    <div class="top-actions">
      <div class="account-menu-wrap">
        <button id="accountMenuBtn" class="ghost account-trigger" type="button" aria-haspopup="menu" aria-expanded="false">Account ⚙️</button>
        <div id="accountMenu" class="account-menu hidden" role="menu">
          <button id="settingsBtn" class="menu-item" type="button" role="menuitem">Settings</button>
          <button id="updateAppBtn" class="menu-item" type="button" role="menuitem">Update app</button>
          <button id="exportBtn" class="menu-item" type="button" role="menuitem">Export backup</button>
          <label class="menu-item import-label" role="menuitem">Import backup<input id="importFile" type="file" accept="application/json" hidden /></label>
        </div>
      </div>
    </div>
  </header>

  <main class="shell">
    <aside class="profile-card">
      <div class="cover"></div>
      <label class="avatar-wrap" for="profilePicInput" title="Upload profile picture">
        <div class="avatar" id="avatarInitials">M</div>
        <span class="avatar-edit">Edit photo</span>
      </label>
      <input id="profilePicInput" type="file" accept="image/*" hidden />
      <input id="profileName" class="profile-name" maxlength="40" />
      <textarea id="profileBio" class="profile-bio" maxlength="140" placeholder="Add a short bio..."></textarea>
      <div class="people-panel">
        <div class="people-panel-head">
          <h3>People</h3>
          <button id="addPersonBtn" class="ghost" type="button">+ Add person</button>
        </div>
        <div id="peopleList" class="people-list"></div>
      </div>
    </aside>

    <section class="feed">
      <form id="postForm" class="composer">
        <textarea id="postText" rows="3" maxlength="1000" placeholder="What's on your mind?"></textarea>
        <div class="composer-row">
          <input id="postDate" type="date" />
          <input id="postTags" type="text" placeholder="tags: family, trip, win" />
          <button type="submit" class="primary">Post</button>
        </div>
        <div class="composer-row composer-row-secondary">
          <div class="people-dropdown-wrap">
            <button id="postPeopleBtn" class="ghost" type="button" aria-haspopup="menu" aria-expanded="false">Tag people</button>
            <div id="postPeopleMenu" class="people-dropdown hidden"></div>
          </div>
        </div>
        <div class="composer-tools">
          <label class="tool-upload">📷 Photo/Video<input id="postMedia" type="file" accept="image/*,video/*" multiple hidden /></label>
          <div id="mediaPreview" class="media-preview"></div>
        </div>
      </form>

      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search memories..." />
        <button id="openFilterBtn" class="ghost" type="button">Advanced filter</button>
        <select id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>

      <div id="emptyState" class="empty hidden">
        <h2>No memories yet</h2>
        <p>Add your first post above. It stays private on this device.</p>
      </div>

      <div id="feedList" class="feed-list"></div>
    </section>
  </main>

  <div id="settingsModal" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="settings-panel" role="document">
      <div class="settings-head">
        <h2 id="settingsTitle">Settings</h2>
        <button id="settingsCloseBtn" class="action-btn" type="button" aria-label="Close settings">✕</button>
      </div>

      <label class="settings-label" for="themeSelect">Theme</label>
      <select id="themeSelect" class="settings-select">
        <option value="system">System</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>

      <button id="settingsClearBtn" class="danger" type="button">Clear all memories</button>
    </div>
  </div>

  <div id="personModal" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="personModalTitle">
    <div class="settings-panel" role="document">
      <div class="settings-head">
        <h2 id="personModalTitle">Add person</h2>
        <button id="personModalCloseBtn" class="action-btn" type="button" aria-label="Close person modal">✕</button>
      </div>
      <label class="settings-label" for="personNameInput">Name</label>
      <input id="personNameInput" class="settings-select" type="text" maxlength="40" />
      <label class="settings-label" for="personRelationshipInput">Relationship</label>
      <input id="personRelationshipInput" class="settings-select" type="text" maxlength="40" />
      <label class="settings-label" for="personPicInput">Profile picture</label>
      <input id="personPicInput" class="settings-select" type="file" accept="image/*" />
      <button id="savePersonBtn" class="primary" type="button">Save person</button>
    </div>
  </div>

  <div id="filterModal" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="filterModalTitle">
    <div class="settings-panel" role="document">
      <div class="settings-head">
        <h2 id="filterModalTitle">Filter posts</h2>
        <button id="filterModalCloseBtn" class="action-btn" type="button" aria-label="Close filter modal">✕</button>
      </div>
      <label class="settings-label" for="tagFilterInput">Tags (comma separated)</label>
      <input id="tagFilterInput" class="settings-select" type="text" placeholder="family, trip" />
      <label class="settings-label">People</label>
      <div id="personFilterList" class="person-filter-list"></div>
      <button id="applyFilterBtn" class="primary" type="button">Apply filter</button>
      <button id="clearFilterBtn" class="ghost" type="button">Clear filter</button>
    </div>
  </div>

  <template id="postTemplate">
    <article class="post">
      <div class="post-head">
        <div class="mini-avatar"></div>
        <div>
          <div class="post-author"></div>
          <div class="post-date"></div>
        </div>
        <div class="post-menu-wrap">
          <button type="button" class="post-menu-btn action-btn" title="Post actions" aria-haspopup="menu" aria-expanded="false">⋯</button>
          <div class="post-menu hidden" role="menu">
            <button type="button" class="menu-item edit-post" role="menuitem">Edit</button>
            <button type="button" class="menu-item delete-post danger-text" role="menuitem">Delete</button>
            <button type="button" class="menu-item copy-post-link" role="menuitem">Copy link</button>
          </div>
        </div>
      </div>
      <p class="post-text"></p>
      <div class="post-edit-editor inline-editor hidden">
        <textarea class="post-edit-input inline-editor-input" rows="3" maxlength="1000"></textarea>
        <div class="inline-editor-actions">
          <button type="button" class="post-edit-cancel action-btn">Cancel</button>
          <button type="button" class="post-edit-save action-btn primary-text">Save</button>
        </div>
      </div>
      <div class="post-media"></div>
      <div class="tag-list"></div>
      <div class="post-actions">
        <button class="post-action-btn like-btn" type="button">👍 Like</button>
        <button class="post-action-btn comment-btn" type="button">💬 Comment</button>
        <button class="post-action-btn share-btn" type="button">↗ Share</button>
      </div>
      <section class="comments">
        <div class="comment-list">
          <div class="comment-item comment-template hidden">
            <div class="comment-author"></div>
            <div class="comment-text"></div>
            <div class="comment-actions">
              <button type="button" class="action-btn comment-edit">Edit</button>
              <button type="button" class="action-btn danger-text comment-delete">Delete</button>
            </div>
            <div class="inline-editor comment-editor hidden">
              <textarea class="inline-editor-input comment-edit-input" rows="2" maxlength="280"></textarea>
              <div class="inline-editor-actions">
                <button type="button" class="action-btn comment-edit-cancel">Cancel</button>
                <button type="button" class="action-btn primary-text comment-edit-save">Save</button>
              </div>
            </div>
          </div>
        </div>
        <form class="comment-form">
          <input class="comment-input" type="text" maxlength="280" placeholder="Write a comment..." />
          <button type="submit" class="ghost">Comment</button>
        </form>
      </section>
    </article>
  </template>

  <div id="messageModal" class="message-modal hidden" role="dialog" aria-modal="true" aria-labelledby="messageModalTitle">
    <div class="message-panel" role="document">
      <h2 id="messageModalTitle" class="message-title"></h2>
      <p id="messageModalText" class="message-text"></p>
      <input id="messageModalInput" class="message-input hidden" type="text" maxlength="40" />
      <div class="message-actions">
        <button id="messageModalCancel" class="ghost hidden" type="button">Cancel</button>
        <button id="messageModalConfirm" class="primary" type="button">OK</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
