<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1877f2" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.svg" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>mybook</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">mybook</div>
    <div class="top-actions">
      <button id="settingsBtn" class="ghost">Settings</button>
      <button id="updateAppBtn" class="ghost">Update app</button>
      <button id="exportBtn" class="ghost">Export</button>
      <label class="ghost import-label">Import<input id="importFile" type="file" accept="application/json" hidden /></label>
    </div>
  </header>

  <main class="shell">
    <aside class="profile-card">
      <div class="cover"></div>
      <label class="avatar-wrap" for="profilePicInput" title="Upload profile picture">
        <div class="avatar" id="avatarInitials">M</div>
        <span class="avatar-edit">Edit photo</span>
      </label>
      <input id="profilePicInput" type="file" accept="image/*" hidden />
      <input id="profileName" class="profile-name" maxlength="40" />
      <textarea id="profileBio" class="profile-bio" maxlength="140" placeholder="Add a short bio..."></textarea>
      <div class="privacy-note">Private. Offline-first. Stored only on this device.</div>
    </aside>

    <section class="feed">
      <form id="postForm" class="composer">
        <textarea id="postText" rows="3" maxlength="1000" placeholder="What's on your mind?"></textarea>
        <div class="composer-row">
          <input id="postDate" type="date" />
          <input id="postTags" type="text" placeholder="tags: family, trip, win" />
          <button type="submit" class="primary">Post</button>
        </div>
        <div class="composer-tools">
          <label class="tool-upload">📷 Photo/Video<input id="postMedia" type="file" accept="image/*,video/*" multiple hidden /></label>
          <div id="mediaPreview" class="media-preview"></div>
        </div>
      </form>

      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search memories..." />
        <select id="sortSelect">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>

      <div id="emptyState" class="empty hidden">
        <h2>No memories yet</h2>
        <p>Add your first post above. It stays private on this device.</p>
      </div>

      <div id="feedList" class="feed-list"></div>
    </section>
  </main>

  <div id="settingsModal" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="settings-panel" role="document">
      <div class="settings-head">
        <h2 id="settingsTitle">Settings</h2>
        <button id="settingsCloseBtn" class="action-btn" type="button" aria-label="Close settings">✕</button>
      </div>

      <label class="settings-label" for="themeSelect">Theme</label>
      <select id="themeSelect" class="settings-select">
        <option value="system">System</option>
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>

      <button id="clearDataBtn" class="danger" type="button">Clear all memories</button>
    </div>
  </div>

  <template id="postTemplate">
    <article class="post">
      <div class="post-head">
        <div class="mini-avatar"></div>
        <div>
          <div class="post-author"></div>
          <div class="post-date"></div>
        </div>
        <button type="button" class="edit-post action-btn" title="Edit memory">Edit</button>
        <button type="button" class="delete-post action-btn danger-text" title="Delete memory">Delete</button>
      </div>
      <p class="post-text"></p>
      <div class="post-edit-editor inline-editor hidden">
        <textarea class="post-edit-input inline-editor-input" rows="3" maxlength="1000"></textarea>
        <div class="inline-editor-actions">
          <button type="button" class="post-edit-cancel action-btn">Cancel</button>
          <button type="button" class="post-edit-save action-btn primary-text">Save</button>
        </div>
      </div>
      <div class="post-media"></div>
      <div class="tag-list"></div>
      <div class="post-actions">
        <button class="like-btn">👍 Like</button>
      </div>
      <section class="comments">
        <div class="comment-list">
          <div class="comment-item comment-template hidden">
            <div class="comment-author"></div>
            <div class="comment-text"></div>
            <div class="comment-actions">
              <button type="button" class="action-btn comment-edit">Edit</button>
              <button type="button" class="action-btn danger-text comment-delete">Delete</button>
            </div>
            <div class="inline-editor comment-editor hidden">
              <textarea class="inline-editor-input comment-edit-input" rows="2" maxlength="280"></textarea>
              <div class="inline-editor-actions">
                <button type="button" class="action-btn comment-edit-cancel">Cancel</button>
                <button type="button" class="action-btn primary-text comment-edit-save">Save</button>
              </div>
            </div>
          </div>
        </div>
        <form class="comment-form">
          <input class="comment-input" type="text" maxlength="280" placeholder="Write a comment..." />
          <button type="submit" class="ghost">Comment</button>
        </form>
      </section>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
